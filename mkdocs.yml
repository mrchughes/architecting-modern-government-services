site_name: Architecting Modern Government Services
site_description: A six-paper series on DDD, evidence-based identity, and LLM-assisted development for government services
site_url: https://mrchughes.github.io/architecting-modern-government-services/
repo_url: https://github.com/mrchughes/architecting-modern-government-services
repo_name: mrchughes/architecting-modern-government-services

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - tables
  - def_list
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

nav:
  - Home: README.md
  - Papers:
    - '1 — DDD & Clean Architecture': Paper_1_DDD_Clean_Architecture.md
    - '2 — Evidence-Based Identity': Paper_2_Evidence_Based_Identity.md
    - '3 — LLM RAG & Guardrails': Paper_3_LLM_RAG_Guardrails.md
    - '4 — Automated LLM Development': Paper_4_Automated_LLM_Development.md
    - '5 — Getting Started': Paper_5_Getting_Started.md
    - '6 — Case Study': Paper_6_Case_Study.md
