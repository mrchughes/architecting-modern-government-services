<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Architecting Modern Government Services</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #1a73e8;
      --sidebar-width: 280px;
    }
    /* Give rendered Mermaid diagrams breathing room */
    .mermaid { margin: 1.5em 0; overflow-x: auto; }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- Mermaid pinned to v10 — load BEFORE docsify -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
  </script>

  <script>
    window.$docsify = {
      name: 'Architecting Modern Government Services',
      repo: 'mrchughes/architecting-modern-government-services',
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 2,
      search: {
        placeholder: 'Search the series...',
        noData: 'No results.',
        depth: 3
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied'
      },
      plugins: [
        // After each page renders, convert mermaid code blocks into diagrams
        function(hook) {
          hook.doneEach(function() {
            document.querySelectorAll('pre[data-lang="mermaid"]').forEach(function(pre) {
              var code = pre.querySelector('code');
              if (!code) return;
              var div = document.createElement('div');
              div.className = 'mermaid';
              div.textContent = code.textContent;
              pre.parentNode.replaceChild(div, pre);
            });
            mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
          });
        }
      ]
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
